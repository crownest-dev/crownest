[project]
name = "crownest"
version = "0.1.0"
description = "Python SDK for CrowNest cloud sandboxes."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
keywords = ["sandbox", "ai-agents", "code-interpreter"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
]
dependencies = ["httpx>=0.27,<1"]

[project.urls]
Homepage = "https://crownest.dev"
Documentation = "https://crownest.dev/docs"
Repository = "https://github.com/crownest-dev/crownest"
Issues = "https://github.com/crownest-dev/crownest/issues"

[dependency-groups]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
addopts = "-q"
asyncio_mode = "auto"
pythonpath = ["src"]
testpaths = ["tests"]
